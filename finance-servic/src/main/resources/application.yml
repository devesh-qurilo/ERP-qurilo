server:
  port: 8088

spring:
  application:
    name: finance-service
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB

  datasource:
    url: ${DB_URL_FINANCE}
    username: ${user}
    password: ${password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: never

  mail:                          # ✅ spring.mail.*
    host: ${EMAIL_HOST:smtp.gmail.com}
    port: ${EMAIL_PORT:587}
    username: ${EMAIL_USERNAME}
    password: ${EMAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
    from: ${EMAIL_FROM:${EMAIL_USERNAME}}   # fallback to username

jwt:
  secret: ${JWT_SECRET}

internal:
  api:
    key: ${INTERNAL_API_KEY}

supabase:
  url: ${SUPABASE_URL}
  service-role-key: ${SUPABASE_SERVICE_ROLE_KEY}
  bucket: ${SUPABASE_BUCKET}
  s3:
    access-key: ${SUPABASE_S3_ACCESS_KEY}
    secret-key: ${SUPABASE_S3_SECRET_KEY}

flyway:
  enabled: true
  locations: classpath:db/migration

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/   # ✅ no trailing dot
