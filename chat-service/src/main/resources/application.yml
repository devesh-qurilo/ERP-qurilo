server:
  port: 8087

spring:
  application:
    name: chat-service
  datasource:
    url: ${DB_URL_CHAT}
    username: ${user}
    password: ${password}
  jpa:
    properties:
      hibernate:
        ddl-auto: update
        format_sql: true
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# Eureka / Service Discovery
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://eureka-server:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: false

# Employee service (Feign)
employee:
  service:
    url: http://employee-service:8083

# Supabase (S3-compatible) storage config
project:
  supabase:
    url: ${SUPABASE_URL}
    service-role-key: ${SUPABASE_SERVICE_ROLE_KEY}
    bucket: ${SUPABASE_BUCKET}
    s3-access-key: ${SUPABASE_S3_ACCESS_KEY}
    s3-secret-key: ${SUPABASE_S3_SECRET_KEY}

# Application custom props
chat:
  attachments:
    presign-ttl-seconds: 300
    temp-dir: ./tmp-attachments
    enabled: true

logging:
  level:
    root: INFO
    com.erp: DEBUG
    com.erp.chat.service: DEBUG
    com.erp.chat.service.ChatService: TRACE
    com.erp.chat.service.FileStorageService: TRACE

jwt:
  secret: ${JWT_SECRET}

internal:
  api:
    key: ${INTERNAL_API_KEY}

frontend:
  origin: http://localhost:3000