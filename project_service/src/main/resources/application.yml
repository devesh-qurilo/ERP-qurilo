server:
  port: 8086

spring:
  application:
    name: project-service
  datasource:
    url: ${DB_URL_PROJECT}
    username: ${user}
    password: ${password}
  jpa:
    hibernate:
      ddl-auto: update  # Change from 'update' to 'validate' or 'none'
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect  # Add this if using PostgreSQL
        enable_lazy_load_no_trans: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true  # Fixed syntax and indentation
    baseline-version: "0"      # Fixed syntax and indentation
    clean-disabled: false      # Add this for safety
    repair-on-migrate: true    # ✅ YE LINE ADD KARO
    validate-on-migrate: false

  # ✅ ADD THIS: Jackson configuration to handle Hibernate proxies
  jackson:
    serialization:
      fail-on-empty-beans: false
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

project:
  supabase:
    url: ${SUPABASE_URL}
    service-role-key: ${SUPABASE_SERVICE_ROLE_KEY}
    bucket: ${SUPABASE_BUCKET}

jwt:
  secret: ${JWT_SECRET}

internal:
  api:
    key: ${INTERNAL_API_KEY}

logging:
  level:
    root: INFO
    org.flywaydb: DEBUG  # Add this for Flyway debugging

# application.yml (additions)
auth:
  jwt-secret: ${JWT_SECRET}
  jwt-issuer: gateway-service
  jwt-audience: project-service

feign:
  client:
    config:
      default:
        loggerLevel: full
